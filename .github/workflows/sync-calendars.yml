name: Sincronizar calendarios iCal

on:
  schedule:
    # Cada 6 horas. La disponibilidad de la web se actualiza sola.
    - cron: "15 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/sync-calendars.mjs
      - name: Commit si hay cambios
        run: |
          if ! git diff --quiet src/_data/availability.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add src/_data/availability.json
            git commit -m "chore: sincronizar disponibilidad desde iCal"
            git push
          else
            echo "Sin cambios en la disponibilidad"
          fi
